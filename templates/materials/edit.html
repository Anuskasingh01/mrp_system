{% extends "base.html" %}
{% block title %}Edit Material{% endblock %}
{% block content %}
<h2 class="page-title">Edit Material</h2>
<div class="card">
<form method="POST">
  <div class="form-grid">
    <div class="form-group"><label>Material Name</label>
      <input type="text" name="material_name" required value="{{ material.material_name }}"></div>
    <div class="form-group"><label>Material Code</label>
      <input type="text" name="material_code" value="{{ material.material_code or '' }}"></div>
    <div class="form-group"><label>Current Stock</label>
      <input type="number" name="stock" required min="0" value="{{ material.stock }}"></div>
    <div class="form-group"><label>Reorder Point</label>
      <input type="number" name="reorder_point" min="0" value="{{ material.reorder_point }}"></div>
    <div class="form-group"><label>Safety Stock</label>
      <input type="number" name="safety_stock" min="0" value="{{ material.safety_stock }}"></div>
    <div class="form-group"><label>Unit Cost (Rs.)</label>
      <input type="number" name="unit_cost" step="0.01" min="0" value="{{ material.unit_cost }}"></div>
    <div class="form-group"><label>Supplier Name</label>
      <input type="text" name="supplier_name" value="{{ material.supplier_name or '' }}"></div>
    <div class="form-group"><label>Lead Time (Days)</label>
      <input type="number" name="lead_time_days" min="1" value="{{ material.lead_time_days }}"></div>
  </div>
  <button type="submit" class="btn btn-primary">Update Material</button>
  <a href="{{ url_for('materials') }}" class="btn btn-warning">Cancel</a>
</form>
</div>
{% endblock %}
