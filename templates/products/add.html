{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<h2 class="page-title">Add New Product</h2>
<div class="card">
<form method="POST">
  <div class="form-group"><label>Product Name</label>
    <input type="text" name="product_name" required placeholder="e.g. Table"></div>
  <div class="form-group"><label>Product Code</label>
    <input type="text" name="product_code" required placeholder="e.g. PROD-001"></div>
  <div class="form-group"><label>Demand (how many to produce)</label>
    <input type="number" name="demand" required min="0" value="0"></div>
  <div class="form-group"><label>Unit</label>
    <select name="unit">
      <option value="pcs">pcs</option>
      <option value="kg">kg</option>
      <option value="litre">litre</option>
    </select></div>
  <button type="submit" class="btn btn-primary">Save Product</button>
  <a href="{{ url_for('products') }}" class="btn btn-warning">Cancel</a>
</form>
</div>
{% endblock %}
